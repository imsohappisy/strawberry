name: Deploy Berry AI to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from Secrets
        run: |
          cat > config.js << 'EOF'
          const BERRY_CONFIG = {
            apiKeys: [
              "${{ secrets.API_KEY_1 }}",
              "${{ secrets.API_KEY_2 }}",
              "${{ secrets.API_KEY_3 }}",
              "${{ secrets.API_KEY_4 }}",
              "${{ secrets.API_KEY_5 }}"
            ]
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
