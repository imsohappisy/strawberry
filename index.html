<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berry AI - 딸기 모티브 인공지능</title>
    <meta name="description" content="달콤하고 스마트한 당신만의 딸기 AI 어시스턴트, 베리입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Background decorative elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <main class="chat-glass-panel">
            <header class="chat-header">
                <div class="ai-profile">
                    <div class="avatar-container">
                        <div class="avatar-glow"></div>
                        <div class="avatar-emoji">🍓</div>
                    </div>
                    <div class="ai-info">
                        <h1>Berry AI</h1>
                        <span class="status">
                            <span class="status-dot"></span> Online & Sweet
                        </span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn theme-toggle" id="theme-toggle" title="테마 변경">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message ai-message">
                    <div class="message-content">
                        안녕하세요! 당신의 상큼한 AI 비서 <strong>베리(Berry)</strong>입니다 🍓<br>
                        무엇을 도와드릴까요? 달콤한 아이디어가 필요하신가요?
                    </div>
                    <div class="message-time">방금 전</div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="베리에게 메시지 보내기..." autocomplete="off" maxlength="20">
                    <span id="char-count">20</span>
                    <button class="send-btn" id="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <!-- 한도 초과 모달 -->
    <div class="modal-backdrop" id="quota-modal" style="display:none;">
        <div class="modal-box">
            <div class="modal-icon">🍓</div>
            <h2 class="modal-title">딸기 소진!</h2>
            <p class="modal-desc">
                오늘의 ai 사용 한도가 전부 소진되었어요.<br>
                내일 자정에 한도가 다시 채워진답니다! 🌙
            </p>
            <p class="modal-sub">개발자에게 문의하면 바로 다시 사용할 수 있어요.<br>개발자가 확인하는 한...</p>
            <p class="modal-detail-error" id="modal-error-msg"></p>
            <button class="modal-btn" id="modal-close-btn">알겠어요 🍓</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
